<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VI Interactive Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117; color: #c9d1d9; min-height: 100vh;
    }

    /* ── Header ── */
    .hdr {
      padding: 1em 2em; border-bottom: 1px solid #21262d;
      display: flex; align-items: baseline; gap: .8em; flex-wrap: wrap;
    }
    .hdr h1 { color: #58a6ff; font-size: 1.2em; white-space: nowrap; }
    .hdr a { color: #8b949e; font-size: .85em; text-decoration: none; white-space: nowrap; }
    .hdr a:hover { color: #58a6ff; }
    .hdr .vi-name {
      color: #f0f6fc; font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: .9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Toolbar ── */
    .toolbar {
      padding: .6em 2em; background: #161b22; border-bottom: 1px solid #21262d;
      display: flex; align-items: center; gap: .4em; flex-wrap: wrap;
    }
    .btn {
      background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
      border-radius: 6px; padding: .3em .75em; font-size: .82em; cursor: pointer;
      line-height: 1.5; user-select: none;
    }
    .btn:hover { background: #30363d; }
    .btn:active { background: #3c444d; }
    .zoom-lbl { color: #8b949e; font-size: .82em; }
    #zoom-val { color: #58a6ff; font-size: .82em; min-width: 3.8em; text-align: center; }
    .tb-sep { flex: 1; }
    .info-badge {
      color: #8b949e; font-size: .78em; padding: .25em .6em;
      border: 1px solid #21262d; border-radius: 4px; white-space: nowrap;
    }
    .hint { color: #484f58; font-size: .78em; white-space: nowrap; }

    /* ── Content ── */
    .content { padding: 1.5em 2em; overflow-x: auto; }

    /* ── Section header ── */
    .sec-hdr {
      color: #8b949e; font-size: .73em; text-transform: uppercase;
      letter-spacing: .06em; margin: 1.5em 0 .8em;
      padding-bottom: .4em; border-bottom: 1px solid #21262d;
    }
    .sec-hdr:first-child { margin-top: 0; }

    /* ── Master image ── */
    .master-wrap {
      display: inline-block; border: 1px solid #30363d;
      border-radius: 6px; overflow: hidden; vertical-align: top;
    }

    /* ── Case group card ── */
    .case-group {
      display: inline-block; vertical-align: top;
      border: 1px solid #21262d; border-radius: 8px;
      overflow: hidden; margin-bottom: 1.2em; outline: none;
      transition: border-color .15s;
    }
    .case-group:focus, .case-group.active { border-color: #58a6ff66; }
    .cg-hdr {
      display: flex; align-items: center; gap: .5em; flex-wrap: wrap;
      padding: .55em .9em; background: #161b22;
      border-bottom: 1px solid #21262d; user-select: none;
    }
    .cg-title { color: #f0f6fc; font-size: .88em; font-weight: 600; }
    .cg-dim { color: #484f58; font-size: .75em; font-family: monospace; }
    .nav { display: flex; align-items: center; gap: .25em; margin-left: auto; }
    .nav-btn {
      background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
      border-radius: 4px; padding: .18em .5em; cursor: pointer;
      font-size: .82em; line-height: 1.5; user-select: none;
    }
    .nav-btn:hover:not(:disabled) { background: #30363d; color: #58a6ff; }
    .nav-btn:disabled { opacity: .3; cursor: default; }
    .case-ctr { color: #8b949e; font-size: .8em; min-width: 5.5em; text-align: center; }
    .cg-body { padding: .6em; background: #0d1117; overflow: auto; }

    /* ── Scalable images ── */
    .scalable-img {
      display: block; max-width: none; height: auto;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    /* ── Supplementary images ── */
    .supp-btn {
      background: none; border: none; color: #58a6ff; cursor: pointer;
      font-size: .84em; padding: .4em 0; display: inline-flex;
      align-items: center; gap: .35em; margin-top: .5em;
    }
    .supp-btn:hover { text-decoration: underline; }
    .supp-grid {
      display: flex; flex-wrap: wrap; gap: .75em; padding: .75em 0;
    }
    .supp-item {
      border: 1px solid #21262d; border-radius: 4px; overflow: hidden;
    }
    .supp-dim {
      color: #484f58; font-size: .7em; font-family: monospace;
      padding: .2em .4em; background: #161b22;
      border-bottom: 1px solid #21262d;
    }

    /* ── Status / error ── */
    .status { padding: 2em; color: #8b949e; font-style: italic; }
    .err { padding: 2em; color: #f85149; }
    .err code { background: #161b22; padding: .1em .3em; border-radius: 3px; font-size: .9em; }
  </style>
</head>
<body>

<div class="hdr">
  <a id="back-link" href="index.html">← Gallery</a>
  <h1>VI Interactive Viewer</h1>
  <span class="vi-name" id="vi-title">Loading…</span>
</div>

<div class="toolbar">
  <span class="zoom-lbl">Zoom:</span>
  <button class="btn" id="btn-fit" title="Scale to fit window width">Fit</button>
  <button class="btn" id="btn-zin" title="Zoom in">+</button>
  <button class="btn" id="btn-zout" title="Zoom out">−</button>
  <button class="btn" id="btn-100" title="Reset to 100%">100%</button>
  <span id="zoom-val">—</span>
  <span class="tb-sep"></span>
  <span class="hint" id="kb-hint" style="display:none">← → navigate cases &nbsp;·&nbsp; Tab switch group</span>
  <span class="info-badge" id="info-badge" style="display:none"></span>
</div>

<div class="content" id="content">
  <p class="status" id="status">Loading VI data…</p>
</div>

<script>
'use strict';

/* ── URL params ── */
const params = new URLSearchParams(location.search);
const src    = params.get('src') || '';
const title  = params.get('title') || src.split('/').pop().replace(/\.html$/i, '') || 'Unknown VI';

document.title = 'Interactive — ' + title;
document.getElementById('vi-title').textContent = title;

/* Back link: return to gallery at same commit */
(function () {
  const m = src.match(/commits\/([0-9a-f]{40})\//i);
  const short = m ? m[1].slice(0, 7) : null;
  document.getElementById('back-link').href = 'index.html' + (short ? '#' + short : '');
})();

/* ── PNG dimension reader (first 24 bytes of IHDR) ── */
function pngDims(b64) {
  try {
    const clean = b64.replace(/\s/g, '').substring(0, 32);
    const raw   = atob(clean);
    const w = ((raw.charCodeAt(16) & 0xff) << 24 | (raw.charCodeAt(17) & 0xff) << 16 |
               (raw.charCodeAt(18) & 0xff) <<  8 |  (raw.charCodeAt(19) & 0xff)) >>> 0;
    const h = ((raw.charCodeAt(20) & 0xff) << 24 | (raw.charCodeAt(21) & 0xff) << 16 |
               (raw.charCodeAt(22) & 0xff) <<  8 |  (raw.charCodeAt(23) & 0xff)) >>> 0;
    return { w, h };
  } catch { return { w: 0, h: 0 }; }
}

/* ── Extract Block Diagram images from parsed document ── */
function extractBDImages(doc) {
  const imgs  = [];
  const h3s   = doc.querySelectorAll('h3, H3');
  let   bdH3  = null;
  for (const h of h3s) {
    if (h.textContent.trim() === 'Block Diagram') { bdH3 = h; break; }
  }
  if (!bdH3) return imgs;

  let node = bdH3.nextElementSibling;
  while (node && node.tagName !== 'H3' && node.tagName !== 'HR') {
    for (const img of node.querySelectorAll('img, IMG')) {
      const raw = img.getAttribute('src') || '';
      if (!raw.startsWith('data:image')) { continue; }
      const comma = raw.indexOf(',');
      const b64   = comma >= 0 ? raw.substring(comma + 1) : '';
      const dims  = pngDims(b64);
      imgs.push({ src: raw, w: dims.w, h: dims.h });
    }
    node = node.nextElementSibling;
  }
  return imgs;
}

/* ── Group images into case structures ──
 *
 * Rule: the first image is always the "master" (full diagram).
 * Remaining images are grouped by pixel dimensions. Consecutive images
 * that share a dimension group belong to the same case structure.
 * Single-occurrence dimensions are "supplementary" (nested diagrams, etc.).
 *
 * We collect groups in order of first appearance so the presentation
 * reflects the depth-first traversal order that LabVIEW uses when exporting.
 */
function buildGroups(images) {
  if (!images.length) return { master: null, groups: [], supp: [] };

  const master = images[0];
  const rest   = images.slice(1);

  /* Count how many times each WxH occurs */
  const freq = Object.create(null);
  rest.forEach(img => {
    const k = img.w + 'x' + img.h;
    freq[k] = (freq[k] || 0) + 1;
  });

  /* Collect groups in order of first appearance */
  const seen        = new Set();
  const orderedDims = [];
  rest.forEach(img => {
    const k = img.w + 'x' + img.h;
    if (!seen.has(k) && freq[k] >= 2) { seen.add(k); orderedDims.push(k); }
  });

  const groups = orderedDims.map(k => {
    const [w, h] = k.split('x').map(Number);
    const cases  = rest.filter(img => img.w === w && img.h === h);
    return { key: k, w, h, cases, current: 0 };
  });

  const groupSet = new Set(orderedDims);
  const supp = rest.filter(img => !groupSet.has(img.w + 'x' + img.h));

  return { master, groups, supp };
}

/* ── Zoom state ── */
let scale        = 1;
let masterNatW   = 0;

function applyScale(s) {
  scale = Math.max(0.05, Math.min(8, s));
  document.getElementById('zoom-val').textContent = Math.round(scale * 100) + '%';
  document.querySelectorAll('.scalable-img').forEach(img => {
    img.style.width = Math.round(+img.dataset.nw * scale) + 'px';
  });
}

function fitToWindow() {
  if (!masterNatW) return;
  const avail = document.getElementById('content').clientWidth - 48;
  applyScale(Math.min(1, avail / masterNatW));
}

document.getElementById('btn-fit').addEventListener('click', fitToWindow);
document.getElementById('btn-zin').addEventListener('click', () => applyScale(scale * 1.25));
document.getElementById('btn-zout').addEventListener('click', () => applyScale(scale / 1.25));
document.getElementById('btn-100').addEventListener('click', () => applyScale(1));

/* ── Build a scaled <img> element ── */
function mkImg(imgData, alt) {
  const el = document.createElement('img');
  el.src           = imgData.src;
  el.alt           = alt || '';
  el.className     = 'scalable-img';
  el.dataset.nw    = imgData.w;
  el.style.width   = Math.round(imgData.w * scale) + 'px';
  el.loading       = 'eager';
  return el;
}

/* ── Keyboard navigation ── */
let activeGroupIdx = 0;
const groupCards   = [];  /* filled during render */

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (!groupCards.length) return;

  const idx  = (activeGroupIdx >= 0 && activeGroupIdx < groupCards.length)
               ? activeGroupIdx : 0;
  const card = groupCards[idx];
  if (!card) return;

  if (e.key === 'ArrowLeft')  { card._nav(-1); e.preventDefault(); }
  if (e.key === 'ArrowRight') { card._nav(+1); e.preventDefault(); }
  if (e.key === 'ArrowUp')    { e.preventDefault(); setActiveGroup(Math.max(0, idx - 1)); }
  if (e.key === 'ArrowDown')  { e.preventDefault(); setActiveGroup(Math.min(groupCards.length - 1, idx + 1)); }
});

function setActiveGroup(i) {
  activeGroupIdx = i;
  groupCards.forEach((c, j) => c.classList.toggle('active', j === i));
  if (groupCards[i]) groupCards[i].focus();
}

/* ── Render everything ── */
function render(data) {
  const content = document.getElementById('content');
  content.innerHTML = '';
  groupCards.length = 0;

  if (!data.master) {
    content.innerHTML = '<p class="err">No Block Diagram images found in this VI report.</p>';
    return;
  }

  /* ── Master ── */
  const masterHdr = document.createElement('p');
  masterHdr.className = 'sec-hdr';
  masterHdr.textContent = 'Full Block Diagram · ' + data.master.w + '×' + data.master.h + 'px';
  content.appendChild(masterHdr);

  const masterWrap = document.createElement('div');
  masterWrap.className = 'master-wrap';
  masterWrap.appendChild(mkImg(data.master, 'Block Diagram'));
  content.appendChild(masterWrap);

  /* ── Case groups ── */
  if (data.groups.length) {
    const csHdr = document.createElement('p');
    csHdr.className = 'sec-hdr';
    csHdr.textContent = 'Case Structures — ' + data.groups.length +
      ' group' + (data.groups.length !== 1 ? 's' : '') + ' detected';
    csHdr.title = 'Groups are identified by images sharing identical pixel dimensions. ' +
      'Use ← → to cycle cases; Up/Down to switch groups.';
    content.appendChild(csHdr);
  }

  data.groups.forEach((group, gi) => {
    /* Card */
    const card = document.createElement('div');
    card.className = 'case-group' + (gi === 0 ? ' active' : '');
    card.tabIndex  = 0;

    /* Header */
    const hdr = document.createElement('div');
    hdr.className = 'cg-hdr';

    const titleSpan = document.createElement('span');
    titleSpan.className = 'cg-title';
    titleSpan.textContent = 'Case Structure ' + (gi + 1);

    const dimSpan = document.createElement('span');
    dimSpan.className = 'cg-dim';
    dimSpan.textContent = group.w + '×' + group.h + 'px · ' +
      group.cases.length + ' case' + (group.cases.length !== 1 ? 's' : '');

    /* Nav controls */
    const nav = document.createElement('div');
    nav.className = 'nav';

    const prevBtn = document.createElement('button');
    prevBtn.className = 'nav-btn';
    prevBtn.textContent = '◄';
    prevBtn.title = 'Previous case  [←]';
    prevBtn.disabled = true;

    const ctr = document.createElement('span');
    ctr.className = 'case-ctr';
    ctr.textContent = '1 / ' + group.cases.length;

    const nextBtn = document.createElement('button');
    nextBtn.className = 'nav-btn';
    nextBtn.textContent = '►';
    nextBtn.title = 'Next case  [→]';
    nextBtn.disabled = group.cases.length <= 1;

    nav.append(prevBtn, ctr, nextBtn);
    hdr.append(titleSpan, dimSpan, nav);

    /* Body */
    const body = document.createElement('div');
    body.className = 'cg-body';
    const img = mkImg(group.cases[0], 'Case 1');
    body.appendChild(img);

    card.append(hdr, body);
    content.appendChild(card);

    /* Navigation function shared with keyboard handler */
    function navigate(delta) {
      group.current = Math.max(0, Math.min(group.cases.length - 1, group.current + delta));
      img.src        = group.cases[group.current].src;
      img.alt        = 'Case ' + (group.current + 1);
      img.style.width = Math.round(group.w * scale) + 'px';
      ctr.textContent = (group.current + 1) + ' / ' + group.cases.length;
      prevBtn.disabled = group.current === 0;
      nextBtn.disabled = group.current === group.cases.length - 1;
    }

    prevBtn.addEventListener('click', e => { e.stopPropagation(); navigate(-1); setActiveGroup(gi); });
    nextBtn.addEventListener('click', e => { e.stopPropagation(); navigate(+1); setActiveGroup(gi); });
    card.addEventListener('focus',     () => setActiveGroup(gi));
    card.addEventListener('mousedown', () => setActiveGroup(gi));

    card._nav = navigate;
    groupCards.push(card);
  });

  /* ── Supplementary / nested views ── */
  if (data.supp.length) {
    const suppSection = document.createElement('div');

    const toggle = document.createElement('button');
    toggle.className = 'supp-btn';
    let suppOpen = false;
    function updateToggle() {
      toggle.textContent = (suppOpen ? '▼' : '▶') +
        ' Nested / other views (' + data.supp.length + ' image' +
        (data.supp.length !== 1 ? 's' : '') + ')';
    }
    updateToggle();

    const grid = document.createElement('div');
    grid.className = 'supp-grid';
    grid.style.display = 'none';

    data.supp.forEach((imgData, i) => {
      const item = document.createElement('div');
      item.className = 'supp-item';
      const lbl = document.createElement('div');
      lbl.className = 'supp-dim';
      lbl.textContent = imgData.w + '×' + imgData.h + 'px';
      item.append(lbl, mkImg(imgData, 'nested view ' + (i + 1)));
      grid.appendChild(item);
    });

    toggle.addEventListener('click', () => {
      suppOpen = !suppOpen;
      grid.style.display = suppOpen ? 'flex' : 'none';
      updateToggle();
      if (suppOpen) applyScale(scale); /* ensure newly visible images are scaled */
    });

    suppSection.append(toggle, grid);
    content.appendChild(suppSection);
  }

  /* ── Info badge ── */
  const totalCases = data.groups.reduce((s, g) => s + g.cases.length, 0);
  const badge      = document.getElementById('info-badge');
  badge.textContent = data.groups.length + ' case struct. · ' + totalCases +
    ' cases · ' + (data.supp.length ? data.supp.length + ' nested' : 'no nested');
  badge.style.display = 'inline-block';

  if (data.groups.length) {
    document.getElementById('kb-hint').style.display = 'inline';
  }
}

/* ── Escape HTML ── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Main: fetch, parse, render ── */
async function main() {
  const statusEl = document.getElementById('status');

  if (!src) {
    document.getElementById('content').innerHTML =
      '<p class="err">No <code>src</code> parameter provided.<br>' +
      'Usage: <code>vi-interactive.html?src=commits/SHA/VI.html&amp;title=main.vi</code></p>';
    return;
  }

  try {
    statusEl.textContent = 'Fetching ' + title + '…';

    const resp = await fetch(src);
    if (!resp.ok) throw new Error('HTTP ' + resp.status + ' fetching ' + src);

    statusEl.textContent = 'Parsing images…';
    const html = await resp.text();

    const parser = new DOMParser();
    const doc    = parser.parseFromString(html, 'text/html');

    const bdImgs = extractBDImages(doc);

    if (!bdImgs.length) {
      document.getElementById('content').innerHTML =
        '<p class="err">No Block Diagram images found. This VI may not have an exported block diagram.</p>';
      return;
    }

    masterNatW = bdImgs[0].w;

    /* Initial zoom: fit master to window */
    const avail = document.getElementById('content').clientWidth - 48;
    scale = Math.min(1, avail / masterNatW);
    document.getElementById('zoom-val').textContent = Math.round(scale * 100) + '%';

    const data = buildGroups(bdImgs);
    render(data);

    /* Apply scale to freshly rendered images */
    applyScale(scale);

    /* Refit on window resize (debounced) */
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(fitToWindow, 180);
    });

  } catch (err) {
    document.getElementById('content').innerHTML =
      '<p class="err">Failed to load VI report: ' + esc(err.message) + '<br>' +
      '<small>If opening this page from a local filesystem, please use a local HTTP server ' +
      '(e.g. <code>npx serve</code>) — <code>fetch()</code> requires HTTP.</small></p>';
  }
}

main();
</script>
</body>
</html>
