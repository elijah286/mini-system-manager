name: Build LabVIEW CI Image

on:
  workflow_dispatch:
    inputs:
      labview_tag:
        description: Readable image tag for CI workflows
        required: false
        default: '2026'
      push_latest:
        description: Also publish latest tag
        type: boolean
        required: false
        default: true
  push:
    branches:
      - main
    paths:
      - '.github/docker/labview-ci.Dockerfile'
      - '.github/workflows/build-labview-image.yml'
      - '.github/labview/vipm/**'
  schedule:
    - cron: '0 8 1 * *'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mini-system-manager-labview
  DEFAULT_TAG: 2026

jobs:
  build-and-push:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Docker daemon is running
        shell: pwsh
        run: |
          $svc = Get-Service docker -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -ne 'Running') {
            Start-Service docker
            Write-Host 'Docker service started'
          } elseif (-not $svc) {
            Write-Host 'Docker service not found - attempting dockerd start'
            Start-Process dockerd -WindowStyle Hidden
            Start-Sleep -Seconds 10
          } else {
            Write-Host 'Docker already running'
          }
          docker info | Select-String 'Server Version'

      - name: Resolve image tags
        id: tags
        shell: pwsh
        run: |
          $inputTag = '${{ github.event.inputs.labview_tag }}'
          if ([string]::IsNullOrWhiteSpace($inputTag)) {
            $resolvedTag = '${{ env.DEFAULT_TAG }}'
          } else {
            $resolvedTag = $inputTag
          }

          $dateTag = (Get-Date).ToString('yyyyMMdd')
          $primaryRef = "${{ env.IMAGE_NAME }}:$resolvedTag"
          $dateRef = "${{ env.IMAGE_NAME }}:$resolvedTag-$dateTag"

          "resolved_tag=$resolvedTag" >> $env:GITHUB_OUTPUT
          "primary_ref=$primaryRef" >> $env:GITHUB_OUTPUT
          "date_ref=$dateRef" >> $env:GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        shell: pwsh
        run: |
          docker build `
            -f .github/docker/labview-ci.Dockerfile `
            -t ${{ steps.tags.outputs.primary_ref }} `
            -t ${{ steps.tags.outputs.date_ref }} `
            .

      - name: Tag latest
        if: github.event.inputs.push_latest != 'false'
        shell: pwsh
        run: |
          docker tag ${{ steps.tags.outputs.primary_ref }} ${{ env.IMAGE_NAME }}:latest

      - name: Push tags
        shell: pwsh
        run: |
          docker push ${{ steps.tags.outputs.primary_ref }}
          docker push ${{ steps.tags.outputs.date_ref }}
          if ('${{ github.event.inputs.push_latest }}' -ne 'false') {
            docker push ${{ env.IMAGE_NAME }}:latest
          }

      - name: Capture image digest
        id: digest
        shell: pwsh
        run: |
          $digest = docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.tags.outputs.primary_ref }}
          "digest=$digest" >> $env:GITHUB_OUTPUT

      - name: Workflow summary
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Published LabVIEW CI image"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Primary tag: ${{ steps.tags.outputs.primary_ref }}"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Date tag: ${{ steps.tags.outputs.date_ref }}"
          if ('${{ github.event.inputs.push_latest }}' -ne 'false') {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Latest tag: ${{ env.IMAGE_NAME }}:latest"
          }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Digest: ${{ steps.digest.outputs.digest }}"
