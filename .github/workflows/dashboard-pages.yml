name: Deploy Dashboard Page

on:
  push:
    branches:
      - main
    paths:
      - '.github/pages/index.html'
      - '.github/workflows/dashboard-pages.yml'
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    concurrency:
      group: dashboard-pages-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare dashboard content
        run: |
          mkdir -p pages-content
          cp .github/pages/index.html pages-content/index.html

      - name: Build dashboard data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]

          headers = {
            "Authorization": f"Bearer {token}",
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28"
          }

          def api_get(path):
            req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/{path}",
              headers=headers,
            )
            with urllib.request.urlopen(req) as resp:
              return json.load(resp)

          try:
            tree_data = api_get("git/trees/gh-pages?recursive=1")
            tree_paths = [n.get("path") for n in tree_data.get("tree", []) if isinstance(n, dict) and n.get("path")]
          except Exception:
            tree_paths = []

          try:
            runs_data = api_get("actions/runs?per_page=100&branch=main&event=push")
            runs = runs_data.get("workflow_runs", [])
          except Exception:
            runs = []

          try:
            commits_data = api_get("commits?sha=main&per_page=60")
            recent_commits = [
              {
                "sha": c.get("sha"),
                "date": (c.get("commit", {}).get("author") or {}).get("date") or (c.get("commit", {}).get("committer") or {}).get("date"),
                "message": (c.get("commit", {}) or {}).get("message", ""),
              }
              for c in commits_data
              if isinstance(c, dict) and c.get("sha") and isinstance(c.get("commit"), dict)
            ]
          except Exception:
            recent_commits = []

          workflow_to_key = {
            "MassCompile - Windows Container": "mc",
            "Run VI Analyzer - Windows Container": "via",
            "VIDiff Report - Windows Container": "vd",
          }

          by_sha = {}
          for run in runs:
            key = workflow_to_key.get(run.get("name"))
            sha = run.get("head_sha")
            if not key or not sha:
              continue

            by_sha.setdefault(sha, {})
            prev = by_sha[sha].get(key)
            created_at = run.get("created_at")
            if not prev or (created_at and created_at > prev.get("createdAt", "")):
              by_sha[sha][key] = {
                "status": run.get("status"),
                "conclusion": run.get("conclusion"),
                "url": run.get("html_url"),
                "createdAt": created_at,
                "title": run.get("display_title"),
              }

          out = {
            "generatedAt": os.environ.get("GITHUB_RUN_ID"),
            "tree": tree_paths,
            "runsBySha": by_sha,
            "recentCommits": recent_commits,
          }

          with open("pages-content/dashboard-data.json", "w", encoding="utf-8") as f:
            json.dump(out, f, indent=2)
          PY

      - name: Deploy dashboard to GitHub Pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-content
          keep_files: true
