name: MassCompile - Windows Container

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - '**/*.vi'
      - '**/*.ctl'
      - '**/*.lvproj'
      - '**/*.lvlib'
      - '**/*.lvlps'
      - '.github/labview/**'
      - '.github/workflows/masscompile-windows-container.yml'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to compile (defaults to HEAD of branch)'
        required: false

permissions:
  contents: write
  pages: write
  statuses: write
  packages: read

env:
  LABVIEW_CONTAINER_IMAGE: ghcr.io/elijah286/mini-system-manager-labview:2026

jobs:
  masscompile-windows:
    runs-on: windows-2022
    concurrency:
      group: pages-deploy
      cancel-in-progress: false

    steps:
      - name: Determine target commit
        id: target
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.commit_sha }}" ]; then
            echo "sha=${{ github.event.inputs.commit_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 0

      - name: Restore CI scripts from main
        if: github.event.inputs.commit_sha != ''
        shell: bash
        run: git checkout origin/main -- .github/labview .github/workflows

      - name: Ensure Docker daemon is running
        run: |
          $svc = Get-Service docker -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -ne 'Running') {
            Start-Service docker
            Write-Host "Docker service started"
          } elseif (-not $svc) {
            Write-Host "Docker service not found - attempting dockerd start"
            Start-Process dockerd -WindowStyle Hidden
            Start-Sleep -Seconds 10
          } else {
            Write-Host "Docker already running"
          }
          docker info | Select-String "Server Version"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-baked LabVIEW container image from GHCR
        run: docker pull ${{ env.LABVIEW_CONTAINER_IMAGE }}

      - name: Run LabVIEWCLI MassCompile
        run: >
          docker run --rm
          -v "${{ github.workspace }}:C:\workspace"
          ${{ env.LABVIEW_CONTAINER_IMAGE }}
          powershell -File "C:\workspace\.github\labview\masscompile.ps1"
          -WorkspaceRoot "C:\workspace"

      - name: Upload MassCompile report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: masscompile-report-windows
          path: ${{ github.workspace }}\masscompile-results\

      - name: Deploy report to GitHub Pages
        if: always()
        shell: bash
        run: |
          TARGET_SHA="${{ steps.target.outputs.sha }}"
          SHORT_SHA=$(echo "${TARGET_SHA}" | cut -c1-7)
          DEPLOY_DIR="pages-content/masscompile/${SHORT_SHA}"
          mkdir -p "$DEPLOY_DIR"

          HTML_REPORT="${{ github.workspace }}/masscompile-results/masscompile-report.html"
          if [ -f "$HTML_REPORT" ]; then
            cp "$HTML_REPORT" "$DEPLOY_DIR/index.html"
          else
            cat > "$DEPLOY_DIR/index.html" <<-'ENDHTML'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Mass Compile Report</title></head>
          <body>
            <h1>Mass Compile Report</h1>
            <p>No report was generated.</p>
          </body>
          </html>
          ENDHTML
          fi

      - name: Publish to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-content
          destination_dir: masscompile
          keep_files: true

      - name: Add commit status with report link
        if: always()
        shell: bash
        run: |
          TARGET_SHA="${{ steps.target.outputs.sha }}"
          SHORT_SHA=$(echo "${TARGET_SHA}" | cut -c1-7)
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/masscompile/masscompile/${SHORT_SHA}/"
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${TARGET_SHA}" \
            -d "{\"state\":\"success\",\"target_url\":\"${REPORT_URL}\",\"description\":\"View Mass Compile report\",\"context\":\"Mass Compile Report\"}"
