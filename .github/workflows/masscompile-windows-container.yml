name: MassCompile - Windows Container

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - '**/*.vi'
      - '**/*.ctl'
      - '**/*.lvproj'
      - '**/*.lvlib'
      - '**/*.lvlps'
      - '.github/labview/**'
      - '.github/workflows/masscompile-windows-container.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.vi'
      - '**/*.ctl'
      - '**/*.lvproj'
      - '**/*.lvlib'
      - '**/*.lvlps'
      - '.github/labview/**'
      - '.github/workflows/masscompile-windows-container.yml'
  workflow_dispatch:

env:
  LABVIEW_CONTAINER_IMAGE: nationalinstruments/labview:latest-windows

jobs:
  masscompile-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull LabVIEW container image
        run: docker pull ${{ env.LABVIEW_CONTAINER_IMAGE }}

      - name: Run LabVIEWCLI MassCompile
        run: >
          docker run --rm
          -v "${{ github.workspace }}:C:\workspace"
          ${{ env.LABVIEW_CONTAINER_IMAGE }}
          powershell -File "C:\workspace\.github\labview\masscompile.ps1"
          -WorkspaceRoot "C:\workspace"
