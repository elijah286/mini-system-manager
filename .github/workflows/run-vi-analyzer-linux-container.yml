name: Run VI Analyzer - Linux Container

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - '**/*.vi'
      - '**/*.ctl'
      - '**/*.lvproj'
      - '**/*.lvlib'
      - '**/*.lvlps'
      - '.github/labview/**'
      - '.github/workflows/run-vi-analyzer-linux-container.yml'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to analyze (defaults to HEAD of branch)'
        required: false

permissions:
  contents: write
  pages: write
  statuses: write

env:
  LABVIEW_LINUX_IMAGE: nationalinstruments/labview:latest-linux

jobs:
  run-vi-analyzer-linux:
    runs-on: ubuntu-latest
    concurrency:
      group: pages-deploy
      cancel-in-progress: false

    steps:
      - name: Determine target commit
        id: target
        run: |
          if [ -n "${{ github.event.inputs.commit_sha }}" ]; then
            echo "sha=${{ github.event.inputs.commit_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 0

      - name: Restore CI scripts from main
        if: github.event.inputs.commit_sha != ''
        run: git checkout origin/main -- .github/labview .github/workflows

      - name: Pull LabVIEW Linux container image
        run: docker pull ${{ env.LABVIEW_LINUX_IMAGE }}

      - name: Run VI Analyzer tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ${{ env.LABVIEW_LINUX_IMAGE }} \
            bash /workspace/.github/labview/run-vi-analyzer.sh

      - name: Upload VI Analyzer report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vi-analyzer-report-linux
          path: ${{ github.workspace }}/vi-analyzer-results/

      - name: Generate HTML report
        if: always()
        run: |
          TARGET_SHA="${{ steps.target.outputs.sha }}"
          SHORT_SHA=$(echo "${TARGET_SHA}" | cut -c1-7)
          DEPLOY_DIR="pages-content/vi-analyzer-linux/${SHORT_SHA}"
          mkdir -p "$DEPLOY_DIR"

          HTML_REPORT="${{ github.workspace }}/vi-analyzer-results/vi-analyzer-report.html"
          if [ -f "$HTML_REPORT" ]; then
            cp "$HTML_REPORT" "$DEPLOY_DIR/index.html"
          else
            cat > "$DEPLOY_DIR/index.html" <<-'ENDHTML'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>VI Analyzer Report (Linux)</title></head>
          <body>
            <h1>VI Analyzer Report (Linux)</h1>
            <p>No HTML report was generated by the VI Analyzer.</p>
          </body>
          </html>
          ENDHTML
          fi

      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-content
          destination_dir: vi-analyzer
          keep_files: true

      - name: Add commit status with report link
        if: always()
        run: |
          TARGET_SHA="${{ steps.target.outputs.sha }}"
          SHORT_SHA=$(echo "${TARGET_SHA}" | cut -c1-7)
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/vi-analyzer/vi-analyzer-linux/${SHORT_SHA}/"
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${TARGET_SHA}" \
            -d "{\"state\":\"success\",\"target_url\":\"${REPORT_URL}\",\"description\":\"View VI Analyzer report (Linux)\",\"context\":\"VI Analyzer Report (Linux)\"}"
