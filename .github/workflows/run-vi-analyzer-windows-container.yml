name: Run VI Analyzer - Windows Container

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - '**/*.vi'
      - '**/*.ctl'
      - '**/*.lvproj'
      - '**/*.lvlib'
      - '**/*.lvlps'
      - '.github/labview/**'
      - '.github/workflows/run-vi-analyzer-windows-container.yml'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to analyze (defaults to HEAD of branch)'
        required: false

permissions:
  contents: write
  pages: write
  statuses: write

env:
  LABVIEW_CONTAINER_IMAGE: nationalinstruments/labview:latest-windows

jobs:
  run-vi-analyzer-windows:
    runs-on: windows-2022
    concurrency:
      group: pages-deploy
      cancel-in-progress: false

    steps:
      - name: Determine target commit
        id: target
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.commit_sha }}" ]; then
            echo "sha=${{ github.event.inputs.commit_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 0

      - name: Restore CI scripts from main
        if: github.event.inputs.commit_sha != ''
        shell: bash
        run: git checkout origin/main -- .github/labview .github/workflows

      - name: Cache LabVIEW container image
        id: cache-image
        uses: actions/cache@v4
        with:
          path: labview-image.tar
          key: labview-container-${{ env.LABVIEW_CONTAINER_IMAGE }}

      - name: Load or pull LabVIEW container image
        run: |
          if (Test-Path "labview-image.tar") {
            Write-Host "Loading cached image..."
            docker load -i labview-image.tar
          } else {
            Write-Host "Pulling image..."
            docker pull ${{ env.LABVIEW_CONTAINER_IMAGE }}
            docker save -o labview-image.tar ${{ env.LABVIEW_CONTAINER_IMAGE }}
          }

      - name: Check VI Analyzer test availability
        run: >
          docker run --rm
          -v "${{ github.workspace }}:C:\workspace"
          ${{ env.LABVIEW_CONTAINER_IMAGE }}
          powershell -File "C:\workspace\.github\labview\check-via-tests.ps1"

      - name: Run VI Analyzer tests
        run: >
          docker run --rm
          -v "${{ github.workspace }}:C:\workspace"
          ${{ env.LABVIEW_CONTAINER_IMAGE }}
          powershell -File "C:\workspace\.github\labview\run-vi-analyzer.ps1"
          -WorkspaceRoot "C:\workspace"

      - name: Upload VI Analyzer report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vi-analyzer-report-windows
          path: ${{ github.workspace }}\vi-analyzer-results\

      - name: Generate HTML report
        if: always()
        shell: bash
        run: |
          TARGET_SHA="${{ steps.target.outputs.sha }}"
          REPORT="${{ github.workspace }}/vi-analyzer-results/Results.txt"
          SHORT_SHA=$(echo "${TARGET_SHA}" | cut -c1-7)
          DEPLOY_DIR="pages-content/vi-analyzer/${SHORT_SHA}"
          mkdir -p "$DEPLOY_DIR"

          if [ -f "$REPORT" ]; then
            CONTENT=$(sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' "$REPORT")
          else
            CONTENT="No report file was generated."
          fi

          cat > "$DEPLOY_DIR/index.html" <<ENDHTML
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>VI Analyzer Report — ${SHORT_SHA}</title>
            <style>
              body { font-family: monospace; margin: 2em; background: #f8f8f8; }
              h1 { font-family: sans-serif; }
              pre { background: #fff; border: 1px solid #ddd; padding: 1em; overflow-x: auto; }
            </style>
          </head>
          <body>
            <h1>VI Analyzer Report — ${SHORT_SHA}</h1>
            <p>Commit: <code>${TARGET_SHA}</code></p>
            <pre>${CONTENT}</pre>
          </body>
          </html>
          ENDHTML

          # Build an index of all reports
          cat > "pages-content/vi-analyzer/index.html" <<ENDINDEX
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>VI Analyzer Reports</title></head>
          <body>
            <h1>VI Analyzer Reports</h1>
            <ul><li><a href="${SHORT_SHA}/">${SHORT_SHA} — $(date -u +%Y-%m-%d)</a></li></ul>
            <p><em>Older reports are available at their commit-SHA path.</em></p>
          </body>
          </html>
          ENDINDEX

      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-content
          destination_dir: vi-analyzer
          keep_files: true

      - name: Add commit status with report link
        if: always()
        shell: bash
        run: |
          TARGET_SHA="${{ steps.target.outputs.sha }}"
          SHORT_SHA=$(echo "${TARGET_SHA}" | cut -c1-7)
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/vi-analyzer/vi-analyzer/${SHORT_SHA}/"
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${TARGET_SHA}" \
            -d "{\"state\":\"success\",\"target_url\":\"${REPORT_URL}\",\"description\":\"View VI Analyzer report\",\"context\":\"VI Analyzer Report\"}"
