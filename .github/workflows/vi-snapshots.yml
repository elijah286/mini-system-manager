name: VI Snapshots - Export & Deploy

on:
  push:
    branches:
      - main
    paths:
      - '**/*.vi'
      - '**/*.ctl'
      - '.github/labview/export-vi-snapshots.ps1'
      - '.github/workflows/vi-snapshots.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

env:
  LABVIEW_CONTAINER_IMAGE: nationalinstruments/labview:latest-windows

jobs:
  export-snapshots:
    name: Export VI front panel & diagram images
    runs-on: windows-2022
    concurrency:
      group: pages-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Docker daemon is running
        run: |
          $svc = Get-Service docker -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -ne 'Running') {
            Start-Service docker
            Write-Host "Docker service started"
          } elseif (-not $svc) {
            Write-Host "Docker service not found - attempting dockerd start"
            Start-Process dockerd -WindowStyle Hidden
            Start-Sleep -Seconds 10
          } else {
            Write-Host "Docker already running"
          }
          docker info | Select-String "Server Version"

      - name: Cache LabVIEW container image
        id: cache-image
        uses: actions/cache@v4
        with:
          path: labview-image.tar
          key: labview-container-${{ env.LABVIEW_CONTAINER_IMAGE }}

      - name: Load or pull LabVIEW container image
        run: |
          if (Test-Path "labview-image.tar") {
            Write-Host "Loading cached image..."
            docker load -i labview-image.tar
          } else {
            Write-Host "Pulling image..."
            docker pull ${{ env.LABVIEW_CONTAINER_IMAGE }}
            docker save -o labview-image.tar ${{ env.LABVIEW_CONTAINER_IMAGE }}
          }

      - name: Export VI snapshots
        run: >
          docker run --rm
          -v "${{ github.workspace }}:C:\workspace"
          ${{ env.LABVIEW_CONTAINER_IMAGE }}
          powershell -File "C:\workspace\.github\labview\export-vi-snapshots.ps1"
          -WorkspaceRoot "C:\workspace"

      - name: Upload snapshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vi-snapshots
          path: ${{ github.workspace }}/vi-snapshots/

      - name: Generate gallery index
        if: always()
        shell: bash
        run: |
          SNAPSHOT_DIR="${{ github.workspace }}/vi-snapshots"
          if [ ! -d "$SNAPSHOT_DIR" ]; then
            echo "No snapshots directory found."
            exit 0
          fi

          # Build gallery index from manifest.json
          MANIFEST="$SNAPSHOT_DIR/manifest.json"
          GALLERY="$SNAPSHOT_DIR/index.html"

          cat > "$GALLERY" <<'HEADER'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>VI Browser — Mini System Manager</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 2em; max-width: 960px; margin: 0 auto; }
              h1 { color: #58a6ff; margin-bottom: 0.3em; font-size: 1.6em; }
              .subtitle { color: #8b949e; margin-bottom: 2em; font-size: 0.95em; }
              .subtitle a { color: #58a6ff; text-decoration: none; }
              .subtitle a:hover { text-decoration: underline; }
              h2 { color: #f0f6fc; margin: 1.5em 0 0.5em; font-size: 1.1em; border-bottom: 1px solid #21262d; padding-bottom: 0.3em; }
              .file-list { list-style: none; }
              .file-list li { padding: 0.4em 0.6em; border-bottom: 1px solid #21262d; }
              .file-list li:hover { background: #161b22; }
              .file-list a { color: #58a6ff; text-decoration: none; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 0.9em; }
              .file-list a:hover { text-decoration: underline; }
              .file-list .dir { color: #8b949e; font-size: 0.8em; margin-right: 0.5em; }
              .badge { display: inline-block; background: #21262d; color: #8b949e; font-size: 0.75em; padding: 0.15em 0.5em; border-radius: 3px; margin-left: 0.5em; }
              .section { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 1.2em; margin-bottom: 1.5em; }
              .back-link { color: #58a6ff; text-decoration: none; font-size: 0.9em; }
              .back-link:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>VI Browser</h1>
            <p class="subtitle">
              <a class="back-link" href="../">← Back to Dashboard</a> ·
              <a href="https://github.com/elijah286/mini-system-manager">elijah286/mini-system-manager</a>
              — Front Panel &amp; Block Diagram snapshots for every VI
            </p>
          HEADER

          if [ -f "$MANIFEST" ]; then
            # Group files by directory using Python for JSON parsing
            python3 -c "
          import json, os, urllib.parse

          with open('$MANIFEST') as f:
              items = json.load(f)

          # Group by directory
          groups = {}
          for item in items:
              d = os.path.dirname(item['path']) or '(root)'
              groups.setdefault(d, []).append(item)

          # Sort groups
          for key in sorted(groups.keys()):
              files = sorted(groups[key], key=lambda x: x['path'])
              label = key if key != '(root)' else 'Root'
              print(f'<div class=\"section\"><h2>{label}</h2><ul class=\"file-list\">')
              for f in files:
                  name = os.path.basename(f['path'])
                  ext = os.path.splitext(name)[1]
                  badge = 'CTL' if ext == '.ctl' else 'VI'
                  href = urllib.parse.quote(f['html'])
                  print(f'<li><a href=\"{href}\">{name}</a><span class=\"badge\">{badge}</span></li>')
              print('</ul></div>')
          " >> "$GALLERY"
          else
            echo '<div class="section"><p style="color: #8b949e; font-style: italic;">No snapshots were generated.</p></div>' >> "$GALLERY"
          fi

          cat >> "$GALLERY" <<'FOOTER'
          </body>
          </html>
          FOOTER

      - name: Deploy snapshots to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ github.workspace }}/vi-snapshots
          destination_dir: vi-snapshots
          keep_files: false
