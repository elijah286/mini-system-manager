name: VI Snapshots - Export & Deploy

on:
  push:
    branches:
      - main
    paths:
      - '**/*.vi'
      - '**/*.ctl'
      - '**/*.lvproj'
      - '.github/labview/export-vi-snapshots.ps1'
      - '.github/labview/build-gallery.py'
      - '.github/pages/vi-browser.html'
      - '.github/pages/vi-interactive.html'
      - '.github/workflows/vi-snapshots.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

env:
  LABVIEW_CONTAINER_IMAGE: nationalinstruments/labview:latest-windows

jobs:
  export-snapshots:
    name: Export VI front panel & diagram images
    runs-on: windows-2022
    concurrency:
      group: vi-snapshots-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Docker daemon is running
        run: |
          $svc = Get-Service docker -ErrorAction SilentlyContinue
          if ($svc -and $svc.Status -ne 'Running') {
            Start-Service docker
            Write-Host "Docker service started"
          } elseif (-not $svc) {
            Write-Host "Docker service not found - attempting dockerd start"
            Start-Process dockerd -WindowStyle Hidden
            Start-Sleep -Seconds 10
          } else {
            Write-Host "Docker already running"
          }
          docker info | Select-String "Server Version"

      - name: Cache LabVIEW container image
        id: cache-image
        uses: actions/cache@v4
        with:
          path: labview-image.tar
          key: labview-container-${{ env.LABVIEW_CONTAINER_IMAGE }}

      - name: Load or pull LabVIEW container image
        run: |
          if (Test-Path "labview-image.tar") {
            Write-Host "Loading cached image..."
            docker load -i labview-image.tar
          } else {
            Write-Host "Pulling image..."
            docker pull ${{ env.LABVIEW_CONTAINER_IMAGE }}
            docker save -o labview-image.tar ${{ env.LABVIEW_CONTAINER_IMAGE }}
          }

      - name: Export VI snapshots
        continue-on-error: true
        run: >
          docker run --rm
          -v "${{ github.workspace }}:C:\workspace"
          ${{ env.LABVIEW_CONTAINER_IMAGE }}
          powershell -File "C:\workspace\.github\labview\export-vi-snapshots.ps1"
          -WorkspaceRoot "C:\workspace"

      - name: Ensure vi-snapshots directory exists
        if: always()
        shell: bash
        run: mkdir -p "${{ github.workspace }}/vi-snapshots"

      - name: Build gallery data
        if: always()
        shell: bash
        run: |
          WORKSPACE="${{ github.workspace }}"
          SNAPSHOT_DIR="$WORKSPACE/vi-snapshots"
          DEPLOY_DIR="$WORKSPACE/vi-snapshots-deploy"
          COMMIT_SHA="${{ github.sha }}"
          PAGES_URL="https://elijah286.github.io/mini-system-manager"
          GALLERY_HTML="$WORKSPACE/.github/pages/vi-browser.html"

          mkdir -p "$DEPLOY_DIR"

          # Pass commit message via env var to avoid shell escaping issues
          export COMMIT_MSG=$(git log -1 --format=%s 2>/dev/null || echo "unknown")
          export COMMIT_DATE=$(git log -1 --format=%cI 2>/dev/null || date -Iseconds)
          export GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          export GITHUB_REPOSITORY="${{ github.repository }}"

          python3 "$WORKSPACE/.github/labview/build-gallery.py" \
            "$WORKSPACE" \
            "$SNAPSHOT_DIR" \
            "$DEPLOY_DIR" \
            "$COMMIT_SHA" \
            "$PAGES_URL" \
            "$GALLERY_HTML"

      - name: Upload snapshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vi-snapshots
          path: ${{ github.workspace }}/vi-snapshots-deploy/

      - name: Deploy snapshots to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ github.workspace }}/vi-snapshots-deploy
          destination_dir: vi-snapshots
          keep_files: true
