name: Deploy VIDiff Reports

on:
  workflow_run:
    workflows:
      - VIDiff Report - Windows Container
      - VIDiff Report - Linux Container
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  pages: write
  statuses: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: pages-deploy
      cancel-in-progress: false

    steps:
      - name: Download VIDiff report artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          pattern: vidiff-report-*
          path: reports
          github-token: ${{ secrets.GITHUB_TOKEN }}
          merge-multiple: true

      - name: Download VIDiff metadata artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          pattern: vidiff-metadata-*
          path: metadata
          github-token: ${{ secrets.GITHUB_TOKEN }}
          merge-multiple: true

      - name: Read metadata
        id: meta
        run: |
          if [ ! -f metadata/platform ]; then
            echo "No VIDiff metadata found. Skipping deployment."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUMBER=$(tr -d '[:space:]' < metadata/pr_number)
          PLATFORM=$(tr -d '[:space:]' < metadata/platform)

          if [ -f metadata/head_sha ]; then
            HEAD_SHA=$(tr -d '[:space:]' < metadata/head_sha)
          else
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          fi

          SHORT_SHA=$(echo "${HEAD_SHA}" | cut -c1-7)

          if [ -n "$PR_NUMBER" ]; then
            echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "label=pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            echo "label=push-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
          fi

          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "platform=${PLATFORM}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Prepare GitHub Pages content
        if: steps.meta.outputs.skip == 'false'
        run: |
          LABEL="${{ steps.meta.outputs.label }}"
          PLATFORM="${{ steps.meta.outputs.platform }}"
          DEPLOY_DIR="pages-content/${LABEL}/${PLATFORM}"

          mkdir -p "$DEPLOY_DIR"

          if [ -d reports ] && find reports -name '*.html' -print -quit | grep -q .; then
            cp -r reports/* "$DEPLOY_DIR/"
          else
            echo "No HTML reports found in artifacts."
            exit 0
          fi

          {
            echo '<!DOCTYPE html>'
            echo '<html><head><meta charset="utf-8"><title>VIDiff Reports</title></head><body>'
            echo "<h1>VIDiff Reports - ${LABEL} (${PLATFORM})</h1>"
            echo '<ul>'
            for file in "$DEPLOY_DIR"/*.html; do
              name=$(basename "$file")
              [ "$name" = 'index.html' ] && continue
              encoded=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$name")
              display=${name%.html}
              echo "<li><a href=\"${encoded}\">${display}</a></li>"
            done
            echo '</ul></body></html>'
          } > "$DEPLOY_DIR/index.html"

      - name: Deploy to GitHub Pages
        if: steps.meta.outputs.skip == 'false'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-content
          destination_dir: vidiff
          keep_files: true

      - name: Comment on PR with report links
        if: steps.meta.outputs.skip == 'false' && steps.meta.outputs.is_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const prNumber = parseInt('${{ steps.meta.outputs.pr_number }}', 10);
            const platform = '${{ steps.meta.outputs.platform }}';
            const repo = context.repo;
            const label = `pr-${prNumber}`;
            const baseUrl = `https://${repo.owner}.github.io/${repo.repo}/vidiff/${label}/${platform}`;
            const deployDir = `pages-content/${label}/${platform}`;

            if (!fs.existsSync(deployDir)) {
              return;
            }

            const reports = fs.readdirSync(deployDir)
              .filter(file => file.endsWith('.html') && file !== 'index.html')
              .sort();

            if (reports.length === 0) {
              return;
            }

            let body = `<!-- vidiff-${platform} -->\n### VIDiff Reports (${platform})\n\n| VI | Report |\n|---|---|\n`;
            for (const report of reports) {
              const displayName = report.replace(/\.html$/, '');
              body += `| ${displayName} | [View Report](${baseUrl}/${encodeURIComponent(report)}) |\n`;
            }
            body += `\n[All Reports](${baseUrl}/index.html)`;

            const { data: comments } = await github.rest.issues.listComments({
              ...repo,
              issue_number: prNumber,
            });

            const marker = `<!-- vidiff-${platform} -->`;
            const existing = comments.find(comment => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                ...repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Add commit status with report link
        if: steps.meta.outputs.skip == 'false'
        run: |
          LABEL="${{ steps.meta.outputs.label }}"
          PLATFORM="${{ steps.meta.outputs.platform }}"
          HEAD_SHA="${{ steps.meta.outputs.head_sha }}"
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/vidiff/${LABEL}/${PLATFORM}"
          DEPLOY_DIR="pages-content/${LABEL}/${PLATFORM}"

          # If there's exactly one report, link directly to it instead of the index
          REPORTS=($(find "$DEPLOY_DIR" -maxdepth 1 -name '*.html' ! -name 'index.html' 2>/dev/null))
          if [ ${#REPORTS[@]} -eq 1 ]; then
            FILENAME=$(basename "${REPORTS[0]}")
            ENCODED=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$FILENAME")
            REPORT_URL="${BASE_URL}/${ENCODED}"
          else
            REPORT_URL="${BASE_URL}/"
          fi

          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${HEAD_SHA}" \
            -d "{\"state\":\"success\",\"target_url\":\"${REPORT_URL}\",\"description\":\"View VIDiff report\",\"context\":\"VIDiff Report\"}"
