name: VIDiff Report - Linux Container

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - '**/*.vi'
      - '**/*.ctl'
      - '.github/labview/**'
      - '.github/workflows/vidiff-linux-container.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.vi'
      - '**/*.ctl'
      - '.github/labview/**'
      - '.github/workflows/vidiff-linux-container.yml'
  workflow_dispatch:
    inputs:
      base_sha:
        description: 'Base commit SHA to diff from'
        required: true
      head_sha:
        description: 'Head commit SHA to diff to'
        required: true

permissions:
  contents: read
  statuses: write

env:
  LABVIEW_LINUX_IMAGE: nationalinstruments/labview:latest-linux

jobs:
  run-vidiff:
    name: Run VIDiff on changed LabVIEW files (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Determine base ref
        id: refs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "base_sha=${{ github.event.inputs.base_sha }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.inputs.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.refs.outputs.head_sha }}
          path: pr

      - name: Checkout base ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.refs.outputs.base_sha }}
          path: base

      - name: Restore CI scripts from main
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd pr
          git checkout origin/main -- .github/labview .github/workflows

      - name: Detect changed LabVIEW files
        id: changed-files
        run: |
          cd pr
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "${{ steps.refs.outputs.base_sha }}" "${{ steps.refs.outputs.head_sha }}" -- '*.vi' '*.ctl' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed LabVIEW files detected."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed LabVIEW files:"
            echo "$CHANGED_FILES"
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGED_FILES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull LabVIEW Linux container image
        if: steps.changed-files.outputs.has_changes == 'true'
        run: docker pull ${{ env.LABVIEW_LINUX_IMAGE }}

      - name: Write VIDiff manifest
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          # Write each file path on its own line so the bash script can handle
          # filenames that contain spaces without any quoting issues.
          printf '%s\n' "${{ steps.changed-files.outputs.files }}" \
            | grep -v '^$' \
            > "${{ github.workspace }}/pr/.vidiff-manifest"

      - name: Run VIDiff
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/pr:/workspace" \
            -v "${{ github.workspace }}/base:/workspace-base" \
            ${{ env.LABVIEW_LINUX_IMAGE }} \
            bash /workspace/.github/labview/vidiff.sh

      - name: Upload VIDiff reports
        if: steps.changed-files.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vidiff-report-linux
          path: ${{ github.workspace }}/pr/vidiff-reports/

      - name: Save metadata
        if: steps.changed-files.outputs.has_changes == 'true'
        run: |
          mkdir -p metadata
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.event.pull_request.number }}" > metadata/pr_number
          else
            echo "" > metadata/pr_number
          fi
          echo "${{ steps.refs.outputs.head_sha }}" > metadata/head_sha
          echo "linux" > metadata/platform

      - name: Upload metadata
        if: steps.changed-files.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vidiff-metadata-linux
          path: metadata/
