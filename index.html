<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CI Reports — Mini System Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 2em; max-width: 960px; margin: 0 auto; }
    h1 { color: #58a6ff; margin-bottom: 0.3em; font-size: 1.6em; }
    .subtitle { color: #8b949e; margin-bottom: 2em; font-size: 0.95em; }
    .subtitle a { color: #58a6ff; text-decoration: none; }
    .subtitle a:hover { text-decoration: underline; }
    h2 { color: #f0f6fc; margin: 1.5em 0 0.8em; font-size: 1.2em; border-bottom: 1px solid #21262d; padding-bottom: 0.4em; }
    .badge-row { display: flex; gap: 0.5em; flex-wrap: wrap; margin-bottom: 1.5em; }
    .badge-row img { height: 20px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 1em; }
    th { text-align: left; padding: 0.6em 0.8em; background: #161b22; color: #8b949e; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #21262d; }
    td { padding: 0.6em 0.8em; border-bottom: 1px solid #21262d; }
    td a { color: #58a6ff; text-decoration: none; }
    td a:hover { text-decoration: underline; }
    .commit-sha { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 0.9em; }
    .loading { color: #8b949e; padding: 1em 0; }
    .empty { color: #8b949e; font-style: italic; padding: 0.8em 0; }
    .section { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 1.2em; margin-bottom: 1.5em; }
  </style>
</head>
<body>
  <h1>CI Reports Dashboard</h1>
  <p class="subtitle">
    <a href="https://github.com/elijah286/mini-system-manager">elijah286/mini-system-manager</a>
    — LabVIEW CI/CD Pipeline Reports
  </p>

  <div class="badge-row">
    <a href="https://github.com/elijah286/mini-system-manager/actions/workflows/masscompile-windows-container.yml"><img src="https://github.com/elijah286/mini-system-manager/actions/workflows/masscompile-windows-container.yml/badge.svg" alt="Mass Compile"></a>
    <a href="https://github.com/elijah286/mini-system-manager/actions/workflows/run-vi-analyzer-windows-container.yml"><img src="https://github.com/elijah286/mini-system-manager/actions/workflows/run-vi-analyzer-windows-container.yml/badge.svg" alt="VI Analyzer"></a>
    <a href="https://github.com/elijah286/mini-system-manager/actions/workflows/vidiff-windows-container.yml"><img src="https://github.com/elijah286/mini-system-manager/actions/workflows/vidiff-windows-container.yml/badge.svg" alt="VIDiff"></a>
  </div>

  <h2>VI Analyzer Reports</h2>
  <div class="section">
    <div id="vi-analyzer-list" class="loading">Loading reports…</div>
  </div>

  <h2>VIDiff Reports</h2>
  <div class="section">
    <div id="vidiff-list" class="loading">Loading reports…</div>
  </div>

  <script>
    const OWNER = 'elijah286';
    const REPO = 'mini-system-manager';
    const PAGES_BASE = `https://${OWNER}.github.io/${REPO}`;
    const API_BASE = `https://api.github.com/repos/${OWNER}/${REPO}`;

    async function fetchTree() {
      const res = await fetch(`${API_BASE}/git/trees/gh-pages?recursive=1`);
      if (!res.ok) throw new Error(`API error: ${res.status}`);
      return (await res.json()).tree || [];
    }

    function renderVIAnalyzer(tree) {
      const container = document.getElementById('vi-analyzer-list');
      const reports = tree
        .filter(n => n.path.match(/^vi-analyzer\/vi-analyzer\/[a-f0-9]+\/index\.html$/))
        .map(n => {
          const sha = n.path.split('/')[2];
          return { sha, url: `${PAGES_BASE}/${n.path}` };
        })
        .sort((a, b) => a.sha.localeCompare(b.sha));

      if (reports.length === 0) {
        container.innerHTML = '<p class="empty">No VI Analyzer reports found yet.</p>';
        return;
      }

      let html = '<table><thead><tr><th>Commit</th><th>Report</th></tr></thead><tbody>';
      for (const r of reports) {
        html += `<tr><td class="commit-sha">${r.sha}</td><td><a href="${r.url}">View Report</a></td></tr>`;
      }
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function renderVIDiff(tree) {
      const container = document.getElementById('vidiff-list');
      const dirs = new Set();
      tree.forEach(n => {
        const m = n.path.match(/^vidiff\/(push-[a-f0-9]+|pr-\d+)\/windows\/index\.html$/);
        if (m) dirs.add(m[1]);
      });

      const reports = Array.from(dirs).map(label => {
        const sha = label.replace('push-', '').replace('pr-', 'PR #');
        return { label, sha, url: `${PAGES_BASE}/vidiff/${label}/windows/` };
      }).sort((a, b) => a.label.localeCompare(b.label));

      if (reports.length === 0) {
        container.innerHTML = '<p class="empty">No VIDiff reports found yet.</p>';
        return;
      }

      let html = '<table><thead><tr><th>Ref</th><th>Report</th></tr></thead><tbody>';
      for (const r of reports) {
        html += `<tr><td class="commit-sha">${r.sha}</td><td><a href="${r.url}">View Report</a></td></tr>`;
      }
      html += '</tbody></table>';
      container.innerHTML = html;
    }

    fetchTree()
      .then(tree => {
        renderVIAnalyzer(tree);
        renderVIDiff(tree);
      })
      .catch(err => {
        document.getElementById('vi-analyzer-list').innerHTML = `<p class="empty">Error loading reports: ${err.message}</p>`;
        document.getElementById('vidiff-list').innerHTML = '';
      });
  </script>
</body>
</html>
