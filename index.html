<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CI Reports — Mini System Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 2em; max-width: 960px; margin: 0 auto; }
    h1 { color: #58a6ff; margin-bottom: 0.3em; font-size: 1.6em; }
    .subtitle { color: #8b949e; margin-bottom: 2em; font-size: 0.95em; }
    .subtitle a { color: #58a6ff; text-decoration: none; }
    .subtitle a:hover { text-decoration: underline; }
    h2 { color: #f0f6fc; margin: 1.5em 0 0.8em; font-size: 1.2em; border-bottom: 1px solid #21262d; padding-bottom: 0.4em; }
    .badge-row { display: flex; gap: 0.5em; flex-wrap: wrap; margin-bottom: 1.5em; }
    .badge-row img { height: 20px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 1em; }
    th { text-align: left; padding: 0.6em 0.8em; background: #161b22; color: #8b949e; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #21262d; }
    td { padding: 0.6em 0.8em; border-bottom: 1px solid #21262d; }
    td a { color: #58a6ff; text-decoration: none; }
    td a:hover { text-decoration: underline; }
    .commit-sha { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 0.9em; }
    .summary { font-size: 0.85em; }
    .pass { color: #3fb950; }
    .fail { color: #f85149; }
    .neutral { color: #8b949e; }
    <script>
      const OWNER = 'elijah286';
      const REPO = 'mini-system-manager';
      const PAGES_BASE = `https://${OWNER}.github.io/${REPO}`;
      const API_BASE = `https://api.github.com/repos/${OWNER}/${REPO}`;
      const WORKFLOW_TO_KEY = {
        'MassCompile - Windows Container': 'mc',
        'Run VI Analyzer - Windows Container': 'via',
        'VIDiff Report - Windows Container': 'vd'
      };

      async function fetchSnapshotCommits() {
        try {
          const res = await fetch(`${PAGES_BASE}/vi-snapshots/commits.json`);
          if (!res.ok) return [];
          const data = await res.json();
          return Array.isArray(data) ? data : [];
        } catch {
          return [];
        }
      }

      async function fetchWorkflowRunsBySha() {
        try {
          const res = await fetch(`${API_BASE}/actions/runs?per_page=100&branch=main&event=push`);
          if (!res.ok) return {};
          const runs = (await res.json()).workflow_runs || [];
          const bySha = {};

          runs.forEach(run => {
            const key = WORKFLOW_TO_KEY[run.name];
            if (!key || !run.head_sha) return;

            if (!bySha[run.head_sha]) bySha[run.head_sha] = {};
            const prev = bySha[run.head_sha][key];
            if (!prev || (new Date(run.created_at) > new Date(prev.createdAt))) {
              bySha[run.head_sha][key] = {
                status: run.status,
                conclusion: run.conclusion,
                url: run.html_url,
                createdAt: run.created_at,
                title: run.display_title
              };
            }
          });

          return bySha;
        } catch {
          return {};
        }
      }

      async function urlExists(url) {
        try {
          const head = await fetch(url, { method: 'HEAD' });
          if (head.ok) return true;
          if (head.status !== 405) return false;
          const get = await fetch(url);
          return get.ok;
        } catch {
          return false;
        }
      }

      async function fetchReportSummary(url) {
        try {
          const res = await fetch(url);
          if (!res.ok) return null;
          const html = await res.text();
          const get = (label) => {
            const m = html.match(new RegExp(label + '(?:\\s+|</td>\\s*<td>)(\\d+)'));
            return m ? parseInt(m[1], 10) : null;
          };
          return {
            visAnalyzed: get('VIs Analyzed'),
            testsRun: get('Total Tests Run'),
            passed: get('Passed Tests'),
            failed: get('Failed Tests')
          };
        } catch {
          return null;
        }
      }

      async function fetchMCSummary(url) {
        try {
          const res = await fetch(url);
          if (!res.ok) return null;
          const html = await res.text();
          const get = (label) => {
            const m = html.match(new RegExp(label + '(?:\\s+|</td>\\s*<td>)(\\d+)'));
            return m ? parseInt(m[1], 10) : null;
          };
          return {
            total: get('Total VIs'),
            compiled: get('Compiled Successfully'),
            failed: get('Failed to Compile'),
            missingDeps: get('Missing Dependencies')
          };
        } catch {
          return null;
        }
      }

      function viaSummaryHtml(s) {
        if (!s) return '<span class="neutral">…</span>';
        if (s.testsRun === 0) return '<span class="neutral">0 tests run</span>';
        const parts = [];
        if (s.failed > 0) parts.push(`<span class="fail">${s.failed} failed</span>`);
        if (s.passed > 0) parts.push(`<span class="pass">${s.passed} passed</span>`);
        parts.push(`<span class="neutral">${s.visAnalyzed} VIs</span>`);
        return parts.join(' · ');
      }

      function mcSummaryHtml(s) {
        if (!s) return '<span class="neutral">…</span>';
        if (s.total === null) return '<span class="neutral">no data</span>';
        const parts = [];
        if (s.failed > 0) parts.push(`<span class="fail">${s.failed} failed</span>`);
        if (s.compiled > 0) parts.push(`<span class="pass">${s.compiled} compiled</span>`);
        parts.push(`<span class="neutral">${s.total} VIs</span>`);
        if (s.missingDeps > 0) parts.push(`<span class="fail">${s.missingDeps} missing deps</span>`);
        return parts.join(' · ');
      }

      function runStateHtml(run, successText) {
        if (!run) return '<span class="neutral">—</span>';
        if (run.status !== 'completed') {
          return `<span class="neutral">running…</span> <a href="${run.url}">actions</a>`;
        }
        if (run.conclusion === 'success') {
          return `<span class="pass">${successText}</span> <a href="${run.url}">actions</a>`;
        }
        if (run.conclusion === 'cancelled') {
          return `<span class="neutral">cancelled</span> <a href="${run.url}">actions</a>`;
        }
        return `<span class="fail">${run.conclusion || 'failed'}</span> <a href="${run.url}">actions</a>`;
      }

      async function fetchVidiffFiles(indexUrl) {
        try {
          const res = await fetch(indexUrl);
          if (!res.ok) return [];
          const html = await res.text();
          const files = [];
          const hrefRe = /href="([^"]+\.html)"/g;
          let m;
          while ((m = hrefRe.exec(html)) !== null) {
            const file = decodeURIComponent(m[1]);
            if (file !== 'index.html') files.push(file);
          }
          return [...new Set(files)];
        } catch {
          return [];
        }
      }

      async function buildReportMaps(commits) {
        const viaReports = {};
        const mcReports = {};
        const vdReports = {};

        await Promise.all(commits.map(async c => {
          const sha = c.sha;
          const short = c.short_sha || sha.slice(0, 7);

          const mcUrl = `${PAGES_BASE}/masscompile/masscompile/${short}/index.html`;
          const viaUrl = `${PAGES_BASE}/vi-analyzer/vi-analyzer/${short}/index.html`;
          const vdIndex = `${PAGES_BASE}/vidiff/push-${short}/windows/index.html`;

          const [mcOk, viaOk, vdOk] = await Promise.all([
            urlExists(mcUrl),
            urlExists(viaUrl),
            urlExists(vdIndex)
          ]);

          if (mcOk) mcReports[sha] = { url: mcUrl };
          if (viaOk) viaReports[sha] = { url: viaUrl };
          if (vdOk) {
            const files = await fetchVidiffFiles(vdIndex);
            vdReports[sha] = {
              files,
              url: `${PAGES_BASE}/vidiff/push-${short}/windows/`
            };
          }
        }));

        return { viaReports, mcReports, vdReports };
      }

      async function renderCombinedTable(commits, runsBySha) {
        const container = document.getElementById('reports-table');

        const { viaReports, mcReports, vdReports } = await buildReportMaps(commits);

        const commitMeta = {};
        commits.forEach(c => {
          commitMeta[c.sha] = {
            date: c.date,
            message: c.message
          };
        });

        const allShas = [...new Set([
          ...Object.keys(viaReports),
          ...Object.keys(mcReports),
          ...Object.keys(vdReports),
          ...Object.keys(runsBySha || {})
        ])];

        if (allShas.length === 0) {
          container.innerHTML = '<p class="empty">No reports found yet.</p>';
          return;
        }

        allShas.forEach(sha => {
          if (commitMeta[sha]) return;
          const run = runsBySha?.[sha];
          if (!run) return;
          const first = run.via || run.mc || run.vd;
          if (!first) return;
          commitMeta[sha] = {
            date: first.createdAt,
            message: first.title || ''
          };
        });

        allShas.sort((a, b) => {
          const da = commitMeta[a]?.date || '';
          const db = commitMeta[b]?.date || '';
          return db.localeCompare(da);
        });

        function formatDate(iso) {
          if (!iso) return '<span class="neutral">—</span>';
          const d = new Date(iso);
          return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        let html = '<table><thead><tr><th>Commit</th><th>Date</th><th>Mass Compile</th><th>VI Analyzer</th><th>VIDiff</th></tr></thead><tbody>';
        for (const sha of allShas) {
          const via = viaReports[sha];
          const mc = mcReports[sha];
          const vd = vdReports[sha];
          const run = runsBySha?.[sha] || {};
          const info = commitMeta[sha];
          const dateCell = formatDate(info?.date);
          const titleAttr = info?.message ? ` title="${info.message.replace(/"/g, '&quot;')}"` : '';

          const mcCell = mc
            ? `<span class="summary" id="mc-${sha}"><span class="neutral">…</span></span> <a href="${mc.url}">report</a>`
            : runStateHtml(run.mc, 'publishing…');
          const viaCell = via
            ? `<span class="summary" id="via-${sha}"><span class="neutral">…</span></span> <a href="${via.url}">report</a>`
            : runStateHtml(run.via, 'publishing…');
          const vdCell = vd
            ? `<span class="summary" id="vd-${sha}"><span class="neutral">…</span></span> <a href="${vd.url}">report</a>`
            : runStateHtml(run.vd, 'publishing…');

          html += `<tr><td class="commit-sha"${titleAttr}>${sha}</td><td>${dateCell}</td><td>${mcCell}</td><td>${viaCell}</td><td>${vdCell}</td></tr>`;
        }
        html += '</tbody></table>';
        container.innerHTML = html;

        const mcFetches = Object.entries(mcReports).map(async ([sha, r]) => {
          const s = await fetchMCSummary(r.url);
          const el = document.getElementById(`mc-${sha}`);
          if (el) el.innerHTML = mcSummaryHtml(s);
        });

        const viaFetches = Object.entries(viaReports).map(async ([sha, r]) => {
          const s = await fetchReportSummary(r.url);
          const el = document.getElementById(`via-${sha}`);
          if (el) el.innerHTML = viaSummaryHtml(s);
        });

        const vdFetches = Object.entries(vdReports).map(async ([sha, r]) => {
          let materialCount = 0;
          const checks = r.files.map(async file => {
            try {
              const res = await fetch(`${r.url}${encodeURIComponent(file)}`);
              if (!res.ok) return false;
              const text = await res.text();
              const idx = text.indexOf('Detailed Information');
              if (idx === -1) return false;
              return text.slice(idx).includes('<details');
            } catch {
              return false;
            }
          });

          const results = await Promise.all(checks);
          materialCount = results.filter(Boolean).length;

          const el = document.getElementById(`vd-${sha}`);
          if (!el) return;
          const total = r.files.length;
          if (total === 0) {
            el.innerHTML = '<span class="neutral">no files</span>';
          } else if (materialCount > 0) {
            el.innerHTML = `<span class="fail">${materialCount} change${materialCount !== 1 ? 's' : ''}</span> · <span class="neutral">${total} file${total !== 1 ? 's' : ''}</span>`;
          } else {
            el.innerHTML = `<span class="pass">no material changes</span> · <span class="neutral">${total} file${total !== 1 ? 's' : ''}</span>`;
          }
        });

        await Promise.all([...mcFetches, ...viaFetches, ...vdFetches]);
      }

      let runsByShaCache = null;

      async function refreshDashboard(fetchRuns = false) {
        try {
          if (fetchRuns || !runsByShaCache) {
            runsByShaCache = await fetchWorkflowRunsBySha();
          }
          const commits = await fetchSnapshotCommits();
          await renderCombinedTable(commits, runsByShaCache || {});
        } catch (err) {
          document.getElementById('reports-table').innerHTML = `<p class="empty">Error loading reports: ${err.message}</p>`;
        }
      }

      refreshDashboard(true);
      setInterval(() => refreshDashboard(false), 30000);
      setInterval(() => refreshDashboard(true), 300000);
    </script>

        });
        const results = await Promise.all(checks);
        materialCount = results.filter(Boolean).length;

        const total = fileMatches.length;
        if (total === 0) {
          el.innerHTML = `<span class="neutral">no files</span> <a href="${url}">report</a>`;
        } else if (materialCount > 0) {
          el.innerHTML = `<span class="fail">${materialCount} change${materialCount !== 1 ? 's' : ''}</span> · <span class="neutral">${total} file${total !== 1 ? 's' : ''}</span> <a href="${url}">report</a>`;
        } else {
          el.innerHTML = `<span class="pass">no material changes</span> · <span class="neutral">${total} file${total !== 1 ? 's' : ''}</span> <a href="${url}">report</a>`;
        }
      });

      await Promise.all([...mcFetches, ...viaFetches, ...vdFetches]);
    }

    async function refreshDashboard() {
      try {
        const [snapshotCommits, runsBySha] = await Promise.all([
          fetchSnapshotCommits(),
          fetchWorkflowRunsBySha()
        ]);
        await renderCombinedTable(snapshotCommits, runsBySha);
      } catch (err) {
        document.getElementById('reports-table').innerHTML = `<p class="empty">Error loading reports: ${err.message}</p>`;
      }
    }

    refreshDashboard();
    setInterval(refreshDashboard, 120000);
  </script>
</body>
</html>
