<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VI Browser — Mini System Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 2em; max-width: 960px; margin: 0 auto; }
    h1 { color: #58a6ff; margin-bottom: 0.3em; font-size: 1.6em; }
    .subtitle { color: #8b949e; margin-bottom: 2em; font-size: 0.95em; }
    .subtitle a { color: #58a6ff; text-decoration: none; }
    .subtitle a:hover { text-decoration: underline; }
    h2 { color: #f0f6fc; margin: 1.5em 0 0.5em; font-size: 1.1em; border-bottom: 1px solid #21262d; padding-bottom: 0.3em; }
    .file-list { list-style: none; }
    .file-list li { padding: 0.4em 0.6em; border-bottom: 1px solid #21262d; }
    .file-list li:hover { background: #161b22; }
    .file-list a { color: #58a6ff; text-decoration: none; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 0.9em; }
    .file-list a:hover { text-decoration: underline; }
    .file-list .dir { color: #8b949e; font-size: 0.8em; margin-right: 0.5em; }
    .badge { display: inline-block; background: #21262d; color: #8b949e; font-size: 0.75em; padding: 0.15em 0.5em; border-radius: 3px; margin-left: 0.5em; }
    .section { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 1.2em; margin-bottom: 1.5em; }
    .back-link { color: #58a6ff; text-decoration: none; font-size: 0.9em; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>VI Browser</h1>
  <p class="subtitle">
    <a class="back-link" href="../">← Back to Dashboard</a> ·
    <a href="https://github.com/elijah286/mini-system-manager">elijah286/mini-system-manager</a>
    — Front Panel &amp; Block Diagram snapshots for every VI
  </p>
<div class="section"><p style="color: #8b949e; font-style: italic;">No snapshots were generated.</p></div>
</body>
</html>
